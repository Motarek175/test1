<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SignUp</title>
    <link rel="stylesheet" href="signup.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="icon" href="../../imgs/logo.png" type="image/x-icon" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  </head>
  <body>
    <div class="flex min-h-full flex-col justify-center px-6 py-12 lg:px-8">
      <div class="sm:mx-auto sm:w-full sm:max-w-sm">
        <div class="text-center">
          <i class="fa-regular fa-circle-user text-5xl text-indigo-600"></i>
        </div>
        <h2
          class="mt-5 text-center text-2xl/9 font-bold tracking-tight text-indigo-600"
        >
          Create your account
        </h2>
      </div>
      <div class="mt-5 sm:mx-auto sm:w-full sm:max-w-sm">
        <form>
          <div class="mb-6">
            <label for="name" class="block text-sm/6 font-medium text-gray-900"
              >User Name</label
            >
            <div class="mt-2">
              <input
                id="name"
                type="text"
                name="name"
                required
                class="block w-full rounded-md bg-white px-3 py-1.5 text-base text-gray-900 outline-1 -outline-offset-1 outline-gray-300 placeholder:text-gray-400 focus:outline-2 focus:-outline-offset-2 focus:outline-indigo-600 sm:text-sm/6"
              />
            </div>
          </div>
          <div class="mb-6">
            <label for="email" class="block text-sm/6 font-medium text-gray-900"
              >Email address</label
            >
            <div class="mt-2">
              <input
                id="email"
                type="email"
                name="email"
                required
                autocomplete="email"
                class="block w-full rounded-md bg-white px-3 py-1.5 text-base text-gray-900 outline-1 -outline-offset-1 outline-gray-300 placeholder:text-gray-400 focus:outline-2 focus:-outline-offset-2 focus:outline-indigo-600 sm:text-sm/6"
              />
            </div>
          </div>
          <div class="mb-6">
            <div class="flex items-center justify-between">
              <label
                for="password"
                class="block text-sm/6 font-medium text-gray-900"
                >Password</label
              >
            </div>
            <div class="mt-2">
              <div class="relative">
                <input
                  id="password"
                  type="password"
                  name="password"
                  required
                  class="block w-full rounded-md bg-white px-3 py-1.5 pr-10 text-base text-gray-900 outline-1 -outline-offset-1 outline-gray-300 focus:outline-2 focus:outline-indigo-600 sm:text-sm/6"
                />

                <button
                  type="button"
                  onclick="togglePassword()"
                  class="absolute cursor-pointer inset-y-0 right-0 flex items-center pr-3 text-gray-500"
                >
                  <i class="fa-regular fa-eye text-indigo-600"></i>
                </button>
              </div>
            </div>
          </div>
          <div class="mb-6">
            <div class="flex items-center justify-between">
              <label
                for="rePassword"
                class="block text-sm/6 font-medium text-gray-900"
                >Repeat Password</label
              >
            </div>
            <div class="mt-2 relative">
              <input
                id="rePassword"
                type="password"
                name="rePassword"
                required
                autocomplete="current-password"
                class="block w-full rounded-md bg-white px-3 py-1.5 text-base text-gray-900 outline-1 -outline-offset-1 outline-gray-300 placeholder:text-gray-400 focus:outline-2 focus:-outline-offset-2 focus:outline-indigo-600 sm:text-sm/6"
              />
              <button
                type="button"
                onclick="togglerePassword()"
                class="absolute cursor-pointer inset-y-0 right-0 flex items-center pr-3 text-gray-500"
              >
                <i class="fa-regular fa-eye text-indigo-600"></i>
              </button>
            </div>
          </div>
          <div class="mb-6">
            <div class="flex items-center justify-between">
              <label
                for="phone"
                class="block text-sm/6 font-medium text-gray-900"
                >Phone Number</label
              >
            </div>
            <div class="mt-2">
              <input
                id="phone"
                type="text"
                name="phone"
                required
                class="block w-full rounded-md bg-white px-3 py-1.5 text-base text-gray-900 outline-1 -outline-offset-1 outline-gray-300 placeholder:text-gray-400 focus:outline-2 focus:-outline-offset-2 focus:outline-indigo-600 sm:text-sm/6"
              />
            </div>
          </div>
        </form>
        <div>
          <button
            class="flex w-full justify-center rounded-md cursor-pointer bg-indigo-600 px-3 py-1.5 text-sm/6 font-semibold text-white shadow-xs"
            onclick="getData()"
          >
            Sign Up
          </button>
        </div>
        <p class="mt-5 text-center text-sm/6 text-gray-500">
          Have an account?
          <a
            href="../signin/signin.html"
            class="font-semibold text-indigo-600 hover:text-indigo-500"
            >Sign In</a
          >
        </p>
      </div>
    </div>
    <script src="signup.js"></script>
  </body>
</html>
